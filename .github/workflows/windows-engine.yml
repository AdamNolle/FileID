name: Windows engine

on:
  push:
    branches: [main]
    paths:
      - 'platforms/windows/**'
      - 'shared/ipc-schema/**'
      - '.github/workflows/windows-engine.yml'
  pull_request:
    paths:
      - 'platforms/windows/**'
      - 'shared/ipc-schema/**'
      - '.github/workflows/windows-engine.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  engine:
    name: Build engine — ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Primary x64 target. windows-latest = windows-2022 as of 2026.
          - label: x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false

          # ARM64 native target. GitHub's `windows-11-arm` runner has been
          # available since late 2024. If the runner shape changes, update
          # this entry rather than the matrix structure.
          - label: arm64-native
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            cross: false

          # ARM64 cross-compile from x64 — proves the toolchain works for
          # devs without ARM64 hardware. Tests are skipped (cross-runs).
          - label: arm64-cross
            runner: windows-latest
            target: aarch64-pc-windows-msvc
            cross: true

    runs-on: ${{ matrix.runner }}

    defaults:
      run:
        working-directory: platforms/windows/src/engine

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # MSRV pinned to 1.90 in rust-toolchain.toml. Keep both files
          # in sync — drift here means CI builds with a different toolchain
          # than contributors use locally.
          toolchain: 1.90
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            platforms/windows/src/engine/target
          key: cargo-${{ matrix.label }}-${{ hashFiles('platforms/windows/src/engine/Cargo.lock', 'platforms/windows/src/engine/Cargo.toml') }}
          restore-keys: |
            cargo-${{ matrix.label }}-

      - name: Format check
        # rustfmt.toml disables all formatting; this stays as a placeholder
        # so the CI shape doesn't change. If a future commit drops the
        # disable_all_formatting=true setting, this gate starts enforcing.
        run: cargo fmt --all -- --check

      - name: Clippy (-D warnings, full)
        # V15.3 Phase 6: tightened to `-D warnings` after a Cargo.toml
        # [lints.clippy] cleanup pass moved style-only pedantic rules to
        # `allow` with documented justifications. Real correctness lints
        # remain `deny`. Any new style-only noise should land an allow in
        # Cargo.toml with a comment, not a CI exception here.
        run: cargo clippy --target ${{ matrix.target }} --all-targets -- -D warnings

      - name: Install cargo-audit + cargo-deny
        if: matrix.label == 'x64'
        run: |
          cargo install --locked cargo-audit
          cargo install --locked cargo-deny

      - name: cargo-deny (license + advisory + dup-version + ban gate)
        if: matrix.label == 'x64'
        # V15.3 Phase 6: enforces deny.toml. License allowlist + advisory
        # check + duplicate-version detection + source allowlist.
        run: cargo deny check

      - name: Audit dependencies (x64 only)
        if: matrix.label == 'x64'
        # V15.3 Phase 6: tightened from continue-on-error to a hard gate
        # now that the lockfile has been audited. Any new advisory wedges
        # the PR until handled.
        run: cargo audit

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Test
        if: matrix.cross == false
        # --all-targets so the pure-Rust unit tests inside lib modules
        # (e.g. `pipeline::identity_clustering`) run, not just integration
        # tests at the workspace root.
        run: cargo test --target ${{ matrix.target }} --all-targets

      - name: Verify binary exists
        shell: pwsh
        run: |
          $exe = "target/${{ matrix.target }}/release/FileIDEngine.exe"
          if (-not (Test-Path $exe)) { throw "Engine binary missing: $exe" }
          $size = (Get-Item $exe).Length / 1MB
          Write-Host ("FileIDEngine.exe size: {0:F1} MB" -f $size)

      # Per-vendor EP smoke: launch the engine, let it emit `ready` on stdout
      # (carrying HardwareInfo + the chosen executionProvider), then send EOF
      # via empty stdin so the engine exits cleanly. On CI hosts we expect
      # CPU fallback (no GPU), so this proves the EP probe + dispatch + JSON
      # serialization are alive on each target arch. On real-hardware
      # verification runs the same step surfaces CUDA / DirectML / QNN.
      - name: Smoke — engine startup + EP probe
        if: matrix.cross == false
        shell: pwsh
        timeout-minutes: 1
        run: |
          $exe = "target/${{ matrix.target }}/release/FileIDEngine.exe"
          New-Item -ItemType File -Path empty-stdin.txt -Force | Out-Null
          $proc = Start-Process -FilePath $exe -PassThru `
            -RedirectStandardInput  "empty-stdin.txt" `
            -RedirectStandardOutput "engine.stdout" `
            -RedirectStandardError  "engine.stderr" `
            -NoNewWindow
          $exited = $proc.WaitForExit(10000)
          $stdout = Get-Content "engine.stdout" -Raw -ErrorAction SilentlyContinue
          $stderr = Get-Content "engine.stderr" -Raw -ErrorAction SilentlyContinue
          Write-Host "=== engine.stdout ==="
          Write-Host ($stdout ?? "<empty>")
          Write-Host "=== engine.stderr ==="
          Write-Host ($stderr ?? "<empty>")
          Write-Host "=== end ==="
          if (-not $exited) {
            try { $proc.Kill() } catch { }
            throw "Engine did not exit within 10 s of stdin EOF."
          }
          if ([string]::IsNullOrWhiteSpace($stdout)) { throw "No stdout from engine — startup failed." }
          # Event JSON is { "t": "...", "payload": { "ready": { "_0": { ... } } } }
          # so the variant tag appears as a JSON key inside payload — match that.
          if (-not ($stdout -match '"ready"\s*:')) {
            Write-Error "engine.stdout did not contain a ready event"
            exit 1
          }
          if (-not ($stdout -match '"executionProvider"\s*:')) {
            Write-Error "ready event missing HardwareInfo.executionProvider"
            exit 1
          }
          Write-Host "Engine startup + EP probe smoke passed. ✅"

      # V14.9-P H6: smoke `verifyCudaPack` so a regression in
      # probe_cuda_pack() (or the `HardwareReprobed` IPC contract) trips
      # CI rather than reaching the Windows Settings card.
      - name: Smoke — verifyCudaPack reprobe
        if: matrix.cross == false
        shell: pwsh
        timeout-minutes: 1
        run: |
          $exe = "target/${{ matrix.target }}/release/FileIDEngine.exe"
          # One UUID-keyed command followed by EOF. Engine should emit a
          # `hardwareReprobed` event on stdout, then exit on stdin close.
          $cmd = '{"id":"00000000-0000-0000-0000-000000000001","payload":{"verifyCudaPack":{}}}'
          Set-Content -Path verify-stdin.txt -Value $cmd -NoNewline
          Add-Content -Path verify-stdin.txt -Value "`n"
          $proc = Start-Process -FilePath $exe -PassThru `
            -RedirectStandardInput  "verify-stdin.txt" `
            -RedirectStandardOutput "verify.stdout" `
            -RedirectStandardError  "verify.stderr" `
            -NoNewWindow
          $exited = $proc.WaitForExit(15000)
          if (-not $exited) {
            try { $proc.Kill() } catch { }
            throw "Engine did not exit within 15 s of stdin EOF on verifyCudaPack smoke."
          }
          $stdout = Get-Content "verify.stdout" -Raw -ErrorAction SilentlyContinue
          if ([string]::IsNullOrWhiteSpace($stdout)) { throw "No stdout from engine — verifyCudaPack handler unreachable." }
          if (-not ($stdout -match '"hardwareReprobed"\s*:')) {
            Write-Error "engine.stdout did not contain a hardwareReprobed event:`n$stdout"
            exit 1
          }
          Write-Host "verifyCudaPack reprobe smoke passed. ✅"

      # Privacy gate: shipped binary must NOT contain telemetry SDK strings.
      # Failing this is a release blocker — no exception.
      - name: Privacy — telemetry-string scan
        if: matrix.label != 'arm64-cross'
        shell: pwsh
        run: |
          $exe = "target/${{ matrix.target }}/release/FileIDEngine.exe"
          # MUST stay in sync with platforms/windows/build/publish-bundle.ps1's
          # $ForbiddenTelemetryStrings (release script). Any addition here
          # should land in publish-bundle.ps1 too. Order is irrelevant.
          $forbidden = @(
            "sentry.io",
            "io.sentry",
            "applicationinsights",
            "applicationinsights.azure.com",
            "googletagmanager",
            "google-analytics.com",
            "segment.io",
            "segment.com",
            "mixpanel.com",
            "amplitude.com",
            "posthog.com",
            "datadoghq",
            "bugsnag",
            "rollbar.com",
            "honeycomb.io",
            "newrelic.com",
            "raygun.io",
            "firebase",
            "firebaseio.com",
            "appcenter.ms",
            "in.appcenter.ms",
            "crashpad",
            "breakpad"
          )
          # SCAN BOTH ASCII AND UTF-16: many telemetry SDKs embed their
          # endpoint URLs as wide strings in .NET assemblies. The release
          # script (publish-bundle.ps1) does the same.
          $bytes = [System.IO.File]::ReadAllBytes($exe)
          $textAscii = [System.Text.Encoding]::ASCII.GetString($bytes)
          $textUtf16 = [System.Text.Encoding]::Unicode.GetString($bytes)
          $hits = @()
          foreach ($needle in $forbidden) {
            if ($textAscii -match [regex]::Escape($needle) -or
                $textUtf16 -match [regex]::Escape($needle)) {
              $hits += $needle
            }
          }
          if ($hits.Count -gt 0) {
            Write-Error "Telemetry strings found in shipped binary: $($hits -join ', ')"
            exit 1
          }
          Write-Host "No telemetry strings detected. ✅"
