name: Windows engine

on:
  push:
    branches: [main]
    paths:
      - 'platforms/windows/**'
      - 'shared/ipc-schema/**'
      - '.github/workflows/windows-engine.yml'
  pull_request:
    paths:
      - 'platforms/windows/**'
      - 'shared/ipc-schema/**'
      - '.github/workflows/windows-engine.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  engine:
    name: Build engine — ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Primary x64 target. windows-latest = windows-2022 as of 2026.
          - label: x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false

          # ARM64 native target. GitHub's `windows-11-arm` runner has been
          # available since late 2024. If the runner shape changes, update
          # this entry rather than the matrix structure.
          - label: arm64-native
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            cross: false

          # ARM64 cross-compile from x64 — proves the toolchain works for
          # devs without ARM64 hardware. Tests are skipped (cross-runs).
          - label: arm64-cross
            runner: windows-latest
            target: aarch64-pc-windows-msvc
            cross: true

    runs-on: ${{ matrix.runner }}

    defaults:
      run:
        working-directory: platforms/windows/src/engine

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.78
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            platforms/windows/src/engine/target
          key: cargo-${{ matrix.label }}-${{ hashFiles('platforms/windows/src/engine/Cargo.lock', 'platforms/windows/src/engine/Cargo.toml') }}
          restore-keys: |
            cargo-${{ matrix.label }}-

      - name: Format check
        # rustfmt.toml disables all formatting; this stays as a placeholder
        # so the CI shape doesn't change. If a future commit drops the
        # disable_all_formatting=true setting, this gate starts enforcing.
        run: cargo fmt --all -- --check

      - name: Clippy (functional lints only)
        # Strict mode (`-D warnings`) generated 427 errors against the
        # existing codebase, almost all clippy::style / clippy::pedantic
        # noise rather than real bugs. Narrow to the lint groups that
        # catch actual defects (correctness, suspicious patterns,
        # potential panics). Re-tighten after a separate cleanup PR.
        #
        # Allow-list:
        #  * const_is_empty — VLM tests deliberately assert non-empty
        #    on prompt constants as documentation; clippy sees through
        #    to "this can never be true" but the assert is intentional.
        #  * result_large_err — sink.rs's TrySendError carries the full
        #    IpcEvent (~168 bytes) by design so callers can recover the
        #    payload after backpressure. Boxing would be churn for no
        #    measurable win on this cold path.
        shell: bash
        run: |
          cargo clippy --target ${{ matrix.target }} --all-targets -- \
            -D clippy::correctness \
            -D clippy::suspicious \
            -D clippy::perf \
            -W clippy::style \
            -W clippy::complexity \
            -A clippy::const_is_empty \
            -A clippy::result_large_err

      - name: Install cargo-audit
        if: matrix.label == 'x64'
        run: cargo install --locked cargo-audit

      - name: Audit dependencies (x64 only)
        if: matrix.label == 'x64'
        # Run on x64 only — the lockfile is identical across targets, no
        # value in scanning three times. Don't fail the build on
        # advisories yet (a couple of legitimate-but-yanked deps may
        # exist in the lock); print + warn.
        continue-on-error: true
        run: cargo audit

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Test
        if: matrix.cross == false
        run: cargo test --target ${{ matrix.target }}

      - name: Verify binary exists
        shell: pwsh
        run: |
          $exe = "target/${{ matrix.target }}/release/FileIDEngine.exe"
          if (-not (Test-Path $exe)) { throw "Engine binary missing: $exe" }
          $size = (Get-Item $exe).Length / 1MB
          Write-Host ("FileIDEngine.exe size: {0:F1} MB" -f $size)

      # Privacy gate: shipped binary must NOT contain telemetry SDK strings.
      # Failing this is a release blocker — no exception.
      - name: Privacy — telemetry-string scan
        if: matrix.label != 'arm64-cross'
        shell: pwsh
        run: |
          $exe = "target/${{ matrix.target }}/release/FileIDEngine.exe"
          # MUST stay in sync with platforms/windows/build/publish-bundle.ps1's
          # $ForbiddenTelemetryStrings (release script). Any addition here
          # should land in publish-bundle.ps1 too. Order is irrelevant.
          $forbidden = @(
            "sentry.io",
            "io.sentry",
            "applicationinsights",
            "applicationinsights.azure.com",
            "googletagmanager",
            "google-analytics.com",
            "segment.io",
            "segment.com",
            "mixpanel.com",
            "amplitude.com",
            "posthog.com",
            "datadoghq",
            "bugsnag",
            "rollbar.com",
            "honeycomb.io",
            "newrelic.com",
            "raygun.io",
            "firebase",
            "firebaseio.com",
            "appcenter.ms",
            "in.appcenter.ms",
            "crashpad",
            "breakpad"
          )
          # SCAN BOTH ASCII AND UTF-16: many telemetry SDKs embed their
          # endpoint URLs as wide strings in .NET assemblies. The release
          # script (publish-bundle.ps1) does the same.
          $bytes = [System.IO.File]::ReadAllBytes($exe)
          $textAscii = [System.Text.Encoding]::ASCII.GetString($bytes)
          $textUtf16 = [System.Text.Encoding]::Unicode.GetString($bytes)
          $hits = @()
          foreach ($needle in $forbidden) {
            if ($textAscii -match [regex]::Escape($needle) -or
                $textUtf16 -match [regex]::Escape($needle)) {
              $hits += $needle
            }
          }
          if ($hits.Count -gt 0) {
            Write-Error "Telemetry strings found in shipped binary: $($hits -join ', ')"
            exit 1
          }
          Write-Host "No telemetry strings detected. ✅"
